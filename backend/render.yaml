services:
  - type: web
    name: bharatyuva-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "bharatyuva-backend.onrender.com,localhost"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
